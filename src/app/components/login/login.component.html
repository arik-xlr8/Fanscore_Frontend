<div class="page">
  <div class="shell">
    <div class="card">
      <div class="head">
        <div class="title">Giriş Yap</div>
        <div class="sub">FanScore hesabınla devam et.</div>
      </div>

      <div class="alert alert--error" *ngIf="error">
        {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="form">
        <div class="field">
          <label for="email">Email</label>
          <div class="inputWrap" [class.inputWrap--error]="email?.touched && email?.invalid">
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="ornek@mail.com"
              autocomplete="email"
            />
          </div>
          <div class="hint hint--error" *ngIf="email?.touched && email?.invalid">
            Geçerli bir email gir.
          </div>
        </div>

        <div class="field">
          <label for="password">Şifre</label>
          <div class="inputWrap" [class.inputWrap--error]="password?.touched && password?.invalid">
            <input
              id="password"
              type="password"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
          <div class="hint hint--error" *ngIf="password?.touched && password?.invalid">
            Şifre zorunludur.
          </div>
        </div>

        <button class="btn" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Giriş Yap</span>
          <span *ngIf="loading">Giriş yapılıyor...</span>
        </button>

        <div class="divider">
          <div class="line"></div>
          <div class="txt">veya</div>
          <div class="line"></div>
        </div>

        <button type="button" class="ghost" (click)="goRegister()">
          Hesabın yok mu? Kayıt ol
        </button>
      </form>
    </div>
  </div>
</div>
