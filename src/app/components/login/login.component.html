<div class="page">
  <div class="shell">
    <div class="card">
      <div class="head">
        <div class="title">Giriş Yap</div>
        <div class="sub">FanScore hesabınla devam et.</div>
      </div>

      <div class="alert" *ngIf="error">
        {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="form">
        <div class="field">
          <label>Email</label>
          <div class="inputWrap" [class.inputWrap--error]="email?.touched && email?.invalid">
            <input
              type="email"
              formControlName="email"
              placeholder="ornek@mail.com"
              autocomplete="email"
            />
          </div>
          <div class="hint" *ngIf="email?.touched && email?.invalid">
            Geçerli bir email gir.
          </div>
        </div>

        <div class="field">
          <label>Şifre</label>
          <div class="inputWrap inputWrap--password" [class.inputWrap--error]="password?.touched && password?.invalid">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button type="button" class="eye" (click)="togglePassword()">
              {{ showPassword ? 'Gizle' : 'Göster' }}
            </button>
          </div>
          <div class="hint" *ngIf="password?.touched && password?.invalid">
            Şifre en az 6 karakter olmalı.
          </div>
        </div>

        <div class="row">
          <label class="check">
            <input type="checkbox" formControlName="rememberMe" />
            <span>Beni hatırla</span>
          </label>

          <button type="button" class="link" (click)="goReset()">
            Şifremi unuttum
          </button>
        </div>

        <button class="btn" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Giriş Yap</span>
          <span *ngIf="loading">Giriş yapılıyor...</span>
        </button>

        <div class="divider">
          <div class="line"></div>
          <div class="txt">veya</div>
          <div class="line"></div>
        </div>

        <button type="button" class="ghost" (click)="goRegister()">
          Hesabın yok mu? Kayıt ol
        </button>
      </form>
    </div>

    <div class="note">
      Dev notu: Şu an endpoint <b>{{ baseUrl }}{{ loginEndpoint }}</b> olarak ayarlı.
      Backend hazır olunca gerçek URL’yi yazarsın.
    </div>
  </div>
</div>
