<div class="page">
  <div class="shell">
    <div *ngIf="isLoading" class="sectionHint">Oyuncu yükleniyor...</div>
    <div *ngIf="error && !isLoading" class="sectionHint">{{ error }}</div>

    <ng-container *ngIf="!error && player">
      <section class="profile">
        <div class="profileTop">
          <div class="avatar">
            <img [src]="photoUrl" [alt]="fullName" />
          </div>

          <div class="meta">
            <div class="nameRow">
              <div class="name">{{ fullName }}</div>
              <div [class]="getChangeClass(change)">
                {{ formatChange(change) }}
              </div>
            </div>

            <div class="subRow">
              <div class="chip">{{ teamName }}</div>
              <div class="chip">{{ position }}</div>
              <div class="chip">Yaş {{ age || '-' }}</div>
            </div>

            <div class="periodFilters">
              <button
                type="button"
                class="filterBtn"
                *ngFor="let period of periods"
                [class.filterBtn--active]="selectedPeriod === period.key"
                (click)="selectPeriod(period.key)"
              >
                {{ period.label }}
              </button>
            </div>

            <div class="quickStats">
              <div class="stat">
                <div class="k">Ortalama Puan</div>
                <div class="v">{{ formatAverageRating(averageRating) }}</div>
              </div>

              <div class="stat">
                <div class="k">Toplam Oy</div>
                <div class="v">{{ ratingCount | number }}</div>
              </div>

              <div class="stat">
                <div class="k">Değişim</div>
                <div class="v">{{ formatChange(change) }}</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </ng-container>
  </div>
</div>
