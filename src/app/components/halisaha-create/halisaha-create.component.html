<div class="page">
  <div class="shell">
    <section class="hero">
      <div class="heroTop">
        <div>
          <div class="title">Halı Saha Oluştur</div>
          <div class="subtitle">
            Yeni bir maç ilanı aç, şehir ve takım boyutunu belirle, oyuncular seni kolayca bulsun.
          </div>
        </div>

        <a routerLink="/halisaha" class="backBtn">
          ← İlanlara Dön
        </a>
      </div>
    </section>

    <section class="formCard">
      <form class="form" (ngSubmit)="onSubmit()">

        <div class="fieldGrid">

          <!-- NAME -->
          <div class="field field--full">
            <label for="name">Maç Adı</label>
            <input
              id="name"
              type="text"
              name="name"
              [(ngModel)]="model.name"
              placeholder="Örn: Cumartesi Akşam 8'e 8 Maç"
              required
            />
          </div>

          <!-- CITY SELECT -->
          <div class="field">
            <label for="cityId">Şehir</label>

            <select
              id="cityId"
              name="cityId"
              [(ngModel)]="model.cityId"
              required
            >
              <option [ngValue]="0">
                {{ cities.length === 0 ? 'Şehirler yüklenemedi' : 'Şehir seç' }}
              </option>

              <option *ngFor="let city of cities" [ngValue]="city.cityId">
                {{ city.cityName }}
              </option>
            </select>
          </div>

          <!-- TEAM SIZE -->
          <div class="field">
            <label for="teamSize">Takım Boyutu</label>
            <input
              id="teamSize"
              type="number"
              name="teamSize"
              [(ngModel)]="model.teamSize"
              min="1"
              placeholder="Örn: 10"
              required
            />
          </div>

          <!-- PRICE -->
          <div class="field field--full">
            <label for="price">Maç Ücreti (₺)</label>
            <input
              id="price"
              type="number"
              name="price"
              [(ngModel)]="model.price"
              min="0"
              step="0.01"
              placeholder="Örn: 150"
              required
            />
          </div>

          <!-- DESCRIPTION -->
          <div class="field field--full">
            <label for="description">Açıklama</label>
            <textarea
              id="description"
              name="description"
              [(ngModel)]="model.description"
              rows="6"
              placeholder="Saat, konum, eksik oyuncu sayısı, zemin türü gibi detayları yaz..."
            ></textarea>
          </div>

        </div>

        <!-- ERROR -->
        <div *ngIf="error" class="stateBox stateBox--error">
          {{ error }}
        </div>

        <!-- SUCCESS -->
        <div *ngIf="success" class="stateBox stateBox--success">
          {{ success }}
        </div>

        <!-- ACTIONS -->
        <div class="actions">
          <a routerLink="/halisaha" class="ghostBtn">
            Vazgeç
          </a>

          <button
            type="submit"
            class="submitBtn"
            [disabled]="loading"
          >
            {{ loading ? 'Oluşturuluyor...' : 'İlanı Oluştur' }}
          </button>
        </div>

      </form>
    </section>
  </div>
</div>
