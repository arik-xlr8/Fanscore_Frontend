<div class="page">
  <div class="shell">

    <div class="card">

      <div class="title">
        Hesap Oluştur
      </div>

      <div class="sub">
        FanScore'a katıl ve oyuncuları oylamaya başla.
      </div>

      <div class="alert" *ngIf="error">
        {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="form">

        <div class="field">
          <label>Email</label>

          <div class="inputWrap">
            <input
              type="email"
              placeholder="ornek@mail.com"
              formControlName="email"
            />
          </div>

          <div class="hint" *ngIf="email?.touched && email?.invalid">
            Geçerli bir email gir.
          </div>
        </div>


        <div class="field">
          <label>Şifre</label>

          <div class="inputWrap">
            <input
              type="password"
              placeholder="******"
              formControlName="password"
            />
          </div>

          <div class="hint" *ngIf="password?.touched && password?.invalid">
            Şifre en az 6 karakter olmalı.
          </div>
        </div>


        <div class="field">
          <label>Şifre Tekrar</label>

          <div class="inputWrap">
            <input
              type="password"
              placeholder="******"
              formControlName="confirmPassword"
            />
          </div>

          <div class="hint" *ngIf="confirmPassword?.touched && confirmPassword?.invalid">
            Şifreyi tekrar gir.
          </div>
        </div>


        <button class="btn" type="submit" [disabled]="loading">

          <span *ngIf="!loading">
            Hesap Oluştur
          </span>

          <span *ngIf="loading">
            Oluşturuluyor...
          </span>

        </button>


        <div class="divider">
          <div class="line"></div>
          <div class="txt">veya</div>
          <div class="line"></div>
        </div>

        <button type="button" class="ghost" (click)="goLogin()">
          Zaten hesabın var mı? Giriş Yap
        </button>

      </form>

    </div>

  </div>
</div>
