<div class="page">
  <div class="shell">
    <div class="card">
      <div class="head">
        <div class="title">Hesap Oluştur</div>
        <div class="sub">FanScore'a katıl ve oyuncuları oylamaya başla.</div>
      </div>

      <div class="alert alert--success" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="alert alert--error" *ngIf="error">
        {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="form">
        <div class="field">
          <label for="email">Email</label>
          <div class="inputWrap" [class.inputWrap--error]="email?.touched && email?.invalid">
            <input
              id="email"
              type="email"
              placeholder="ornek@mail.com"
              formControlName="email"
              autocomplete="email"
            />
          </div>
          <div class="hint hint--error" *ngIf="email?.touched && email?.invalid">
            Geçerli bir email gir.
          </div>
        </div>

        <div class="field">
          <label for="password">Şifre</label>
          <div class="inputWrap" [class.inputWrap--error]="password?.touched && password?.invalid">
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              formControlName="password"
              autocomplete="new-password"
            />
          </div>
          <div class="hint hint--error" *ngIf="password?.touched && password?.invalid">
            Şifre en az 6 karakter olmalı.
          </div>
        </div>

        <div class="field">
          <label for="confirmPassword">Şifre Tekrar</label>
          <div class="inputWrap" [class.inputWrap--error]="confirmPassword?.touched && confirmPassword?.invalid">
            <input
              id="confirmPassword"
              type="password"
              placeholder="••••••••"
              formControlName="confirmPassword"
              autocomplete="new-password"
            />
          </div>
          <div class="hint hint--error" *ngIf="confirmPassword?.touched && confirmPassword?.invalid">
            Şifreyi tekrar gir.
          </div>
        </div>

        <button class="btn" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Hesap Oluştur</span>
          <span *ngIf="loading">Oluşturuluyor...</span>
        </button>

        <div class="divider">
          <div class="line"></div>
          <div class="txt">veya</div>
          <div class="line"></div>
        </div>

        <button type="button" class="ghost" (click)="goLogin()">
          Zaten hesabın var mı? Giriş Yap
        </button>
      </form>
    </div>
  </div>
</div>
