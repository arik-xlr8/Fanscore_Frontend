<div class="rating-panel">
  <div class="rating-panel__header">
    <h3 class="rating-panel__title">Oy Ver</h3>
    <p class="rating-panel__subtitle">
      Oyuncunun piyasa değeri sizce bu zaman aralığında kaç eder?
    </p>
  </div>

  <div class="rating-panel__body">
    <div class="form-group">
      <label for="periodType">Zaman Aralığı</label>
      <select
        id="periodType"
        class="input"
        [ngModel]="selectedPeriod"
        (ngModelChange)="onPeriodChange($event)"
      >
        <option *ngFor="let period of periods" [ngValue]="period.key">
          {{ period.label }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="ratingValue">Değer / Puan</label>
      <input
        id="ratingValue"
        type="number"
        class="input"
        min="0"
        max="100"
        step="0.1"
        [(ngModel)]="ratingValue"
        (blur)="clampRating()"
        placeholder="Örn: 55"
      />
    </div>

    <div class="form-group">
      <label for="comment">Yorum (opsiyonel)</label>
      <textarea
        id="comment"
        class="input textarea"
        rows="4"
        [(ngModel)]="comment"
        placeholder="Kısa bir yorum yazabilirsin"
      ></textarea>
    </div>

    <div class="vote-info">
      <div class="vote-info__message">
        {{ availabilityMessage }}
      </div>

      <div
        class="vote-info__message"
        *ngIf="nextAvailableText"
      >
        {{ nextAvailableText }}
      </div>
    </div>
  </div>

  <div class="rating-panel__footer">
    <button
      type="button"
      class="btn btn--secondary"
      (click)="closePanel()"
    >
      İptal
    </button>

    <button
      type="button"
      class="btn btn--primary"
      [disabled]="!canSubmit"
      (click)="submitVote()"
    >
      {{ isSubmitting ? 'Gönderiliyor...' : 'Oyu Gönder' }}
    </button>
  </div>
</div>
