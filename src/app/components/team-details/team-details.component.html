<div *ngIf="loading">Yükleniyor...</div>

<div *ngIf="!loading && teamDetail" class="team-detail-page">
  <div class="team-header">
    <div class="team-info">
      <img
        *ngIf="teamDetail.ppUrl; else noTeamImage"
        [src]="teamDetail.ppUrl"
        [alt]="teamDetail.teamName"
        class="team-image"
      />

      <ng-template #noTeamImage>
        <div class="no-team-image">No Image</div>
      </ng-template>

      <div class="team-texts">
        <h2>{{ teamDetail.teamName }}</h2>

        <div class="period-buttons">
          <button
            *ngFor="let period of periods"
            (click)="changePeriod(period.value)"
            [class.active]="selectedPeriod === period.value"
          >
            {{ period.label }}
          </button>
        </div>
      </div>
    </div>

    <div class="team-value-box">
      <span class="team-value-title">Takım Değeri</span>
      <strong>{{ teamDetail.teamTotalValue | number:'1.1-1' }}</strong>
    </div>
  </div>

  <div class="players-section">
    <h3>Oyuncular</h3>

    <div *ngIf="teamDetail.players.length === 0">
      Bu takıma ait oyuncu bulunamadı.
    </div>

    <div class="player-list" *ngIf="teamDetail.players.length > 0">
      <div class="player-card" *ngFor="let player of teamDetail.players">
        <img
          *ngIf="player.ppUrl; else noPlayerImage"
          [src]="player.ppUrl"
          [alt]="player.fullName"
          class="player-image"
        />

        <ng-template #noPlayerImage>
          <div class="no-player-image">No Image</div>
        </ng-template>

        <div class="player-content">
          <div class="player-name">{{ player.fullName }}</div>
          <div class="player-position">{{ player.position || 'Pozisyon yok' }}</div>
        </div>

        <div class="player-rating">
          {{ player.ratingValue | number:'1.1-1' }}
        </div>
      </div>
    </div>
  </div>
</div>
